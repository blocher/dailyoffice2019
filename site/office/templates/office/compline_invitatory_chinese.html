<h2>{{  data.heading }}</h2>
<table class="dialogue">
    <tr>
        <td><em>主禮</em></td>
        <td>上帝啊，快快拯救我們；</td>
    </tr>
    <tr>
        <td><em>會眾</em></td>
        <td><strong>主啊，趕快幫助我們。</strong></td>
    </tr>
    <tr>
        <td><em>主禮</em></td>
        <td>但願榮耀歸於聖父、聖子、聖靈；</td>
    </tr>
    <tr>
        <td><em>會眾</em></td>
        <td><strong>始初如此，現今如此，後來亦如此，永無窮盡。阿們。{%  if data.alleluia %} 哈利路亞。{% endif %}</strong></td>
    </tr>
</table>
