<h2>La Despedida</h2>
<table class="dialogue">
    <tr>
        <td><em>Oficiante</em></td>
        <td>Bendigamos al Señor.</td>
    </tr>
    <tr>
        <td><em>Pueblo</em></td>

<p><em>El Oficiante concluye con lo siguiente</em></p>

<p>El todopoderoso y misericordioso Señor, Padre, Hijo y Espíritu Santo, bendícenos y guárdanos, esta noche y para siempre. <strong>Amén.</strong></p>
